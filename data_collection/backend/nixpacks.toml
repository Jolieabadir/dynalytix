[phases.setup]
aptPkgs = ["libgl1-mesa-glx", "libglib2.0-0", "libsm6", "libxext6", "libxrender1", "libxcb1", "libxcb-shm0", "libxcb-render0", "libgomp1"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "python -m uvicorn src.web.api:app --host 0.0.0.0 --port ${PORT:-8000}"
